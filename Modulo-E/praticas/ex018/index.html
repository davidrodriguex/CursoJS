<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 018 - Modulo E</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tabuada</h1>
    </header>
    <section>
        <div id="input-content">
            <p class="input-group" id="input-number">
                <input type="number" id="inum" name="inum" placeholder="Digite um número" required>
            </p>
            <p class="input-group" id="input-button">
                <button id="btn">Gerar Tabuada</button>
            </p>
        </div>
        <div id="output-content">
            <h2>Resultado</h2>
            <textarea name="result" id="result" readonly></textarea>
        </div>
    </section>
    <footer>

</html>
