<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16 - Modulo E</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contagem Automática</h1>
    </header>
    <section>
        <div id="input-values-content">
            <p id="inicio" class="input-numbers">
                <label for="i_inicio">Início</label>
                <input type="number" name="i_inicio" id="i_inicio">
            </p>
            <p id="fim" class="input-numbers">
                <label for="i_fim">Fim</label>
                <input type="number" name="i_fim" id="i_fim">
            </p>
            <p id="passo" class="input-numbers">
                <label for="i_passo">Passo</label>
                <input type="number" name="i_passo" id="i_passo">
            </p>
            <p id="btn">
                <input type="button" value="Contar" onclick="contar()">
            </p>
        </div>
        <div id="output-content">
            Preparando contagem
        </div>
    </section>
    <footer>
        <p><a href="https://www.cursoemvideo.com/cursos/" target="_blank">&copy; CursoemVideo</a></p>
        <p><a href="https://github.com/davidrodriguex/" target="_blank">GitHub David Rodrigues</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
