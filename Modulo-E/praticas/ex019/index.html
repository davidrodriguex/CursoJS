<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <div id="input-content" class="icontent">
            <div id="form">
                <label for="inum"><strong>Número (1 - 100)</strong></label>
                <input type="number" name="inum" id="inum">
                <button type="button" class="btn" id="btn_1">Adicionar</button>
            </div>
        </div>
        <hr class="line">
        <div id="output-content" class="icontent">
            <div id="initial-output">
                <select name="saida_1" id="saida_1" size="10"></select>
                <button type="button" id="btn_2" class="btn">Finalizar</button>
            </div>
            <div id="final-output" class="icontent"></div>
        </div>
    </section>
    <footer>
        <p><a href="https://www.cursoemvideo.com/cursos/" target="_blank">&copy; CursoemVideo</a></p>
        <p><a href="https://github.com/davidrodriguex/" target="_blank">GitHub David Rodrigues</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
