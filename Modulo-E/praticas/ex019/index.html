<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <div id="input-content">
            <div id="form">
                <label for="inum">Número(1 - 100)</label>
                <input type="number" name="inum" id="inum">
            </div>
            <button type="button" class="btn">Adicionar</button>
        </div>
        <div id="output-content">
            <div id="initial-output">
                <select name="saida_1" id="saida_1"></select>
                <button type="button" class="btn">Finalizar</button>
            </div>
            <div id="final-output"></div>
        </div>
    </section>
    <footer>

        <p><a href="https://github.com/davidrodriguex/" target="_blank">GitHub David Rodrigues</a></p>
    </footer>
</body>
</html>
