<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14 - Modulo D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <section>
        <div id="form-content">
            <p id="input-age">
                <label for="iage"><strong>Ano de Nascimento:</strong></label>
                <input type="number" id="iage" name="iage" required>
            </p>
            <p id="input-sexo">
                <strong>Sexo:</strong>
                <input type="radio" name="isexo" id="masc" value="Masculino" required> 
                <label for="masc">Masculino</label>
                <input type="radio" name="isexo" id="fem" value="Feminino" required> 
                <label for="fem">Feminino</label>
            </p>
            <p id="input-btn">
                <input type="button" value="Verificar" id="btn" onclick="verificar()">
            </p>
        </div>
        <div id="output-content">
            <p id="output-text">Preencha os dados acima para ver o resultado.</p>
        </div>
    </section>
    <footer>
        <p><a href="https://www.cursoemvideo.com/cursos/" target="_blank">&copy; CursoemVideo</a></p>
        <p><a href="https://github.com/davidrodriguex/" target="_blank">GitHub David Rodrigues</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
