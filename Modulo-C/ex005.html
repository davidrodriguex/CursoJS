<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <style>
        body{
            font: normal 15pt Arial;
        }
        #form{
            background-color: antiquewhite;
            padding: 15px;
            width: 80%;
            height: 250px;
            margin: 0 auto;
        }
        .boxes{
            padding: 10px;
        }
        #btn{
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Soma Simples</h1>
    <div id="form">
        <p class="boxes">
            <label for="cxn1">Escolha o primeiro número:</label>
            <input type="number" name="cxn1" id="cxn1">
        </p>
        <p class="boxes">
            <label for="cxn2">Escolha o segundo número:</label>
            <input type="number" name="cxn2" id="cxn2">
        </p>
        <input type="button" value="Somar" id="btn" onclick="somar()">
        <div id="resultado"></div>
    </div>
    <script>
        var saida = document.getElementById('resultado')
    
        function somar(){
            var tn1 = document.getElementById('cxn1')
            var tn2 = document.querySelector('input#cxn2')

            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            
            var s = n1 + n2
            
            saida.innerHTML = `A soma de ${n1} + ${n2} = ${s}`
        }
    </script>
</body>
</html>
