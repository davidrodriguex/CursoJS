<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulo B - Aula 6</title>
    <style>
        body{
            background-color: tomato;
            color: #ffff;
            font-size: 24pt;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <script>
        var n1 = Number.parseInt(window.prompt("Digite um número:")) // window.prompt retorna uma string, por isso é necessário converter para número usando parseInt
        var n2 = parseInt(prompt("Digite outro número:")) // Number e window são opcionais, pois parseInt e prompt são métodos globais
        var s = n1 + n2
        alert(`A soma entre ${n1} e ${n2} é ${s}.`) // usando template string para exibir o resultado da soma
    </script>
</body>
</html>
