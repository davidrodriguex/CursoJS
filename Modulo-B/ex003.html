<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulo B - Aula 6</title>
    <style>
        body{
            font-family: arial;
            font-size: 24pt;
        }
    </style>
</head>
<body>

    <script>
        var nome = prompt("Digite seu nome:")
        document.write(`Olá, <strong>${nome}</strong>. Seu nome tem ${nome.length} letras.<br/>`)
        document.write(`Em maiúscula: ${nome.toUpperCase()}<br/>`)
        document.write(`Em maiúscula: ${nome.toLowerCase()}<br/>`)
    </script>
</body>
</html>
